plugins {
    id 'java'
    id 'war'
}

group 'com.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.13.2'
}

sourceCompatibility = '22'
targetCompatibility = '22'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

dependencies {
    // Trái tim của Spring MVC — tương thích Tomcat 10.x (jakarta.servlet)
    implementation 'org.springframework:spring-webmvc:7.0.6'

    // JSP API — cần thiết để biên dịch file .jsp
    implementation 'jakarta.servlet.jsp:jakarta.servlet.jsp-api:3.1.1'
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    // JSTL — dùng jakarta namespace, tương thích Tomcat 10.x
    implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.2'

    // JSTL implementation
    implementation 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'
}

test {
    useJUnitPlatform()
}
